apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: my-pipeline-app
spec:
  template:
    spec:
      containers:
      - image: my-app-image # This placeholder will be automatically replaced by Cloud Deploy
        ports:
        - containerPort: 8080
        resources:
          limits:
            cpu: 1000m
            memory: 512Mi